# ============================================
# KEYBINDINGS
# ============================================

# Reload config (vim-style)
unbind r
bind r source-file ~/.tmux.conf

# Split panes using | and - (more intuitive)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill pane/window without prompt
bind x kill-pane
bind X kill-window

# Detach
bind d detach

# Zoom pane
bind z resize-pane -Z

# Copy mode - vim style
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Popup menu with sessions
bind s display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Popup lazygit
bind g display-popup -w 90% -h 90% -E "lazygit"

# Popup yazi file manager
bind f display-popup -w 90% -h 90% -E "yazi"

# Session management
bind C-c new-session
bind C-s command-prompt -p "Rename session:" "rename-session '%%'"

# Toggle status bar
bind b set -g status

# Sync panes
bind S setw synchronize-panes

# ============================================
# STATUS BAR
# ============================================

# Force refresh status bar
bind R refresh-client -S

# ============================================
# RESURRECT & CONTINUUM KEYBINDINGS
# ============================================

# Manual save/restore (Ctrl+S Ctrl+S to save, Ctrl+S Ctrl+R to restore)
bind C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# Alternative: Prefix + S (capital) for save, Prefix + R for restore
bind S run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
