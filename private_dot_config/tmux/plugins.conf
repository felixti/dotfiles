# ============================================
# TMUX PLUGIN CONFIGURATION
# ============================================

# ============================================
# PLUGINS
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# ============================================
# CATPPUCCIN THEME
# ============================================

# Flavor
set -g @catppuccin_flavor 'mocha'

# Window style: rounded uses 蟬ｶ and 蟬ｴ separators
set -g @catppuccin_window_status_style 'rounded'

# Window number on the right side
set -g @catppuccin_window_number_position 'right'

# Window text
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Window number colors
set -g @catppuccin_window_number_color '#{@thm_overlay_0}'
set -g @catppuccin_window_current_number_color '#{@thm_mauve}'

# Window text colors
set -g @catppuccin_window_text_color '#{@thm_surface_0}'
set -g @catppuccin_window_current_text_color '#{@thm_surface_1}'

# Show window flags (activity, zoom, etc.)
set -g @catppuccin_window_flags 'icon'

# ============================================
# STATUS LINE (DEVELOPER PRO)
# ============================================

set -g status-left-length 100
set -g status-right-length 300

# Left side - Session name only
set -g status-left '#{E:@catppuccin_status_session}'

# Right side - Developer Pro: Git | AI | Lang | Directory
# Each script outputs styled segments with 蟬ｶ蟬ｴ separators

# Git Module (Green)
set -g status-right '#(bash ‾/.config/tmux/scripts/git_status.sh "#{pane_current_path}")'

# AI Module (Mauve)
set -ga status-right '#(bash ‾/.config/tmux/scripts/ai_status.sh "#{pane_pid}")'

# Language Module (Blue)
set -ga status-right '#(bash ‾/.config/tmux/scripts/lang_status.sh "#{pane_current_path}")'

# Directory Module (Overlay - always last)
set -ga status-right '#[fg=#6c7086]蟬ｶ#[bg=#6c7086,fg=#cdd6f4] 雒ｻ #{b:pane_current_path} #[fg=#6c7086,bg=default]蟬ｴ'

# ============================================
# MODULE CONFIGURATION
# ============================================

# Session
set -g @catppuccin_session_text ' #S'

# ============================================
# PLUGIN OPTIONS
# ============================================

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3'
set -g @resurrect-dir '‾/.local/share/tmux/resurrect'

# Continuum
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

# Yank
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_with_mouse 'on'

# ============================================
# STATUS UPDATE INTERVAL
# ============================================

# Update status bar every 2 seconds for git/ai detection
set -g status-interval 2

# ============================================
# TPM INITIALIZATION (keep at bottom)
# ============================================

run '‾/.tmux/plugins/tpm/tpm'
