# ============================================
# POWERHOUSE TMUX CONFIGURATION
# ============================================
# Main config - inspired by vim workflow
# Reload: tmux source-file ~/.tmux.conf
# Or: Prefix + r
# ============================================

# ============================================
# BASIC SETTINGS
# ============================================

# Prefix to Ctrl+S (vim-friendly)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Terminal colors (truecolor support)
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# Mouse support
set -g mouse on

# Vim mode keys
setw -g mode-keys vi

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar at top
set -g status-position top

# History limit
set -g history-limit 100000

# Escape time (faster response)
set -sg escape-time 10

# Focus events for vim
set -g focus-events on

# ============================================
# KEYBINDINGS
# ============================================

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Split panes using | and -
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Kill pane/window
bind x kill-pane
bind X kill-window

# Zoom pane
bind z resize-pane -Z

# Copy mode
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Popups
bind g display-popup -w 90% -h 90% -E 'lazygit'
bind f display-popup -w 90% -h 90% -E 'yazi'

# ============================================
# PLUGINS (see plugins.conf)
# ============================================

source-file ~/.config/tmux/plugins.conf
