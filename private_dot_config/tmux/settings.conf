# ============================================
# GENERAL SETTINGS
# ============================================

# Set prefix to Ctrl+S (vim-friendly, doesn't conflict with C-a for beginning of line)
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Mouse support
set -g mouse on

# Terminal colors and features (truecolor support for vim/neovim)
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'
set -ag terminal-overrides ',ghostty:RGB'

# Enable focus events for vim
set -g focus-events on

# Start window and pane numbering at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# History limit
set -g history-limit 100000

# Escape time (faster response)
set -sg escape-time 10

# Focus events (for nvim and other apps)
set -g focus-events on

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off

# Update status bar every 5 seconds
set -g status-interval 5

# Automatic rename
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Set titles
set -g set-titles on
set -g set-titles-string '#S: #W'

# Clipboard integration
set -g set-clipboard on

# Status bar at top (vim-style)
set-option -g status-position top

# Pane border styles (will be overridden by catppuccin theme)
set -g pane-border-style 'fg=#585b70'
set -g pane-active-border-style 'fg=#89b4fa'

# Message style (will be overridden by catppuccin)
set -g message-style 'fg=#cdd6f4,bg=#313244'
set -g message-command-style 'fg=#cdd6f4,bg=#313244'

# Remove conflicting status style (catppuccin handles this)
set -g status-style default
