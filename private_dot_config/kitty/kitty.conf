# ============================================
# KITTY CONFIGURATION - POWERHOUSE SETUP
# Catppuccin Mocha + JetBrains Mono Nerd Font
# ============================================

# ============================================
# FONT CONFIGURATION
# ============================================

font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size 15.0

# Enable ligatures
enable_ligatures always

# ============================================
# CURSOR CONFIGURATION
# ============================================

cursor #f5c2e7
cursor_text_color #1e1e2e
cursor_shape block
cursor_blink_interval 0

# ============================================
# SCROLLBACK
# ============================================

scrollback_lines 100000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# ============================================
# MOUSE
# ============================================

mouse_hide_wait 3.0
focus_follows_mouse no

# ============================================
# PERFORMANCE
# ============================================

repaint_delay 10
input_delay 3
sync_to_monitor yes

# ============================================
# WINDOW LAYOUT
# ============================================

remember_window_size yes
initial_window_width 120c
initial_window_height 35c

window_border_width 0
draw_minimal_borders yes

window_margin_width 0
window_padding_width 8

placement_strategy center

# Hide window decorations (title bar, etc.)
hide_window_decorations no

# Background opacity (90% opacity = 10% transparent)
background_opacity 0.90

# ============================================
# TAB BAR
# ============================================

tab_bar_edge top
tab_bar_margin_width 0
tab_bar_style powerline
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ============================================
# COLOR SCHEME: CATPPUCCIN MOCHA
# ============================================

# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #cdd6f4
selection_background    #353749

# Cursor colors
cursor                  #f5c2e7
cursor_text_color       #1e1e2e

# URL underline color when hovering with mouse
url_color               #f5c2e7

# kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors (macOS and Wayland)
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# The 16 terminal colors

# Black
color0 #45475a
color8 #585b70

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #cba6f7
color13 #cba6f7

# Cyan
color6  #89dceb
color14 #89dceb

# White
color7  #bac2de
color15 #a6adc8

# ============================================
# ADVANCED
# ============================================

# Shell integration
shell_integration enabled

# Allow remote control
allow_remote_control no

# Listen on
# listen_on unix:/tmp/kitty

# Update check
update_check_interval 24

# Startup session
# startup_session session.conf

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ============================================
# KEYBOARD SHORTCUTS
# ============================================

# New tab
map ctrl+shift+t new_tab
map cmd+t new_tab

# Close tab
map ctrl+shift+w close_tab
map cmd+w close_tab

# Next/Previous tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab

# Go to tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# New window
map ctrl+shift+n new_window
map cmd+n new_window

# New OS window
map ctrl+shift+enter new_os_window

# Close window
map ctrl+shift+q close_window

# Resize window
map ctrl+shift+r start_resizing_window

# Next/Previous window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Move window
map ctrl+shift+. move_window_forward
map ctrl+shift+, move_window_backward

# Move window to top
map ctrl+shift+f move_window_to_top

# Go to window
map ctrl+shift+f1 first_window
map ctrl+shift+f2 second_window
map ctrl+shift+f3 third_window
map ctrl+shift+f4 fourth_window
map ctrl+shift+f5 fifth_window
map ctrl+shift+f6 sixth_window
map ctrl+shift+f7 seventh_window
map ctrl+shift+f8 eighth_window
map ctrl+shift+f9 ninth_window
map ctrl+shift+f10 tenth_window

# ============================================
# SPLIT WINDOWS
# ============================================

# Split horizontally
map ctrl+shift+d launch --location=hsplit

# Split vertically
map ctrl+shift+minus launch --location=vsplit

# Split and keep focus
map ctrl+shift+alt+d launch --location=hsplit --dont-take-focus

# Resize splits
map ctrl+shift+left resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter
map ctrl+shift+home resize_window reset

# ============================================
# NAVIGATION (like Vim/tmux)
# ============================================

# Navigate splits with vim keys
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Jump to specific layout
map ctrl+shift+f6 goto_layout stack
map ctrl+shift+f7 goto_layout tall
map ctrl+shift+f8 goto_layout grid

# ============================================
# SCROLLING
# ============================================

# Scroll up/down
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down

# Scroll page up/down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Scroll to top/bottom
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# ============================================
# COPY/PASTE
# ============================================

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Paste from selection
map ctrl+shift+s paste_from_selection

# ============================================
# FONTS
# ============================================

# Increase/Decrease font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+kp_add change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+kp_subtract change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# ============================================
# MISC
# ============================================

# Toggle fullscreen
map ctrl+shift+f11 toggle_fullscreen
map ctrl+cmd+f toggle_fullscreen

# Toggle maximized
map ctrl+shift+f10 toggle_maximized

# Clear terminal
map ctrl+shift+k clear_terminal scroll active

# Reset terminal
map ctrl+shift+delete reset_terminal

# Run arbitrary process
map ctrl+shift+u kitten unicode_input

# Edit config file
map ctrl+shift+f2 edit_config_file

# Reload config file
map ctrl+shift+f5 load_config_file

# Debug kitty
map ctrl+shift+f6 debug_config

# ============================================
# MOUSE ACTIONS
# ============================================

# Open URL with click
mouse_map ctrl+click open_url_with_hints

# Show scrollback in pager
mouse_map ctrl+shift+press ungrabbed mouse_show_command_output

# ============================================
# INCLUDE LOCAL CONFIG
# ============================================

include kitty-local.conf
